name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (patch/minor/major/auto)'
        required: false
        default: 'auto'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch 3.24.0 https://github.com/flutter/flutter.git --depth 1 /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH

      - name: Flutter version
        run: flutter --version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto bump version
        run: |
          chmod +x scripts/auto_version.py
          python3 scripts/auto_version.py ${{ github.event.inputs.bump_type || 'auto' }}

      - name: Show new version
        run: grep "^version:" pubspec.yaml

      - name: Commit version bump
        run: |
          git add pubspec.yaml
          git commit -m "ci: auto version bump to $(grep '^version:' pubspec.yaml | cut -d' ' -f2)" || echo "No version change to commit"
          git push

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build debug APK
        run: |
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oc-admin-app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Flutter SDK
        run: |
          git clone --depth 1 --branch 3.24.0 https://github.com/flutter/flutter.git --depth 1 /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH

      - name: Flutter version
        run: flutter --version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto bump version
        run: |
          chmod +x scripts/auto_version.py
          python3 scripts/auto_version.py ${{ github.event.inputs.bump_type || 'auto' }}

      - name: Show new version
        run: grep "^version:" pubspec.yaml

      - name: Commit version bump
        run: |
          git add pubspec.yaml
          git commit -m "ci: auto version bump to $(grep '^version:' pubspec.yaml | cut -d' ' -f2)" || echo "No version change to commit"
          git push

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oc-admin-app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
