name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Flutter SDK (China mirror)
        run: |
          cd $HOME
          git clone --depth 1 --branch stable https://gitee.com/mirrors/Flutter.git FlutterSDK
          echo "$HOME/FlutterSDK/bin" >> $GITHUB_PATH

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build debug APK
        run: |
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oc-admin-app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Flutter SDK (China mirror)
        run: |
          cd $HOME
          git clone --depth 1 --branch stable https://gitee.com/mirrors/Flutter.git FlutterSDK
          echo "$HOME/FlutterSDK/bin" >> $GITHUB_PATH

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oc-admin-app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
